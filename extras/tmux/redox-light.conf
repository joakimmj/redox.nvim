# redox-light — tmux theme (light)
# Source from your tmux.conf:
#   source-file /path/to/extras/tmux/redox-light.conf

# Status bar
set -g status-style "bg=#E4EDE9,fg=#526C68"

# Window tabs
setw -g window-status-style         "fg=#526C68,bg=#E4EDE9"
setw -g window-status-format        " #I:#W "
setw -g window-status-current-style "fg=#E4EDE9,bg=#8A4F18,bold"
setw -g window-status-current-format " #I:#W "

# Status content
set -g status-left  "#[fg=#247068,bold][#S] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD)#[default]"
set -g status-right "#[fg=#267068][#{=21:pane_index}:#{=21:pane_current_command}] #[fg=#3A5450]%Y-%m-%d %H:%M "

# Messages
set -g message-style         "bg=#CAD7D1,fg=#1C2B29"
set -g message-command-style "bg=#CAD7D1,fg=#3D2A00"

# Copy mode
setw -g mode-style "fg=#8A4F18,bg=#B2C4BF"

# Pane borders
set -g pane-border-style        "fg=#CAD7D1"
set -g pane-active-border-style "fg=#247068"

# Popup border hint (pass to display-popup via -S):
#   -S "fg=#8A4F18"

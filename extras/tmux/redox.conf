# redox — tmux theme (dark)
# Source from your tmux.conf:
#   source-file /path/to/extras/tmux/redox.conf

# Status bar
set -g status-style "bg=#2E3434,fg=#919D9B"

# Window tabs
setw -g window-status-style         "fg=#919D9B,bg=#2E3434"
setw -g window-status-format        " #I:#W "
setw -g window-status-current-style "fg=#2E3434,bg=#E3A36F,bold"
setw -g window-status-current-format " #I:#W "

# Status content
set -g status-left  "#[fg=#7EC1AE,bold][#S] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD)#[default]"
set -g status-right "#[fg=#8FC7B7][#{=21:pane_index}:#{=21:pane_current_command}] #[fg=#AFC3BE]%Y-%m-%d %H:%M "

# Messages
set -g message-style         "bg=#3A4141,fg=#DCE8E5"
set -g message-command-style "bg=#3A4141,fg=#FFD7A0"

# Copy mode
setw -g mode-style "fg=#E3A36F,bg=#3F4A4A"

# Pane borders
set -g pane-border-style        "fg=#3A4141"
set -g pane-active-border-style "fg=#7EC1AE"

# Popup border hint (pass to display-popup via -S):
#   -S "fg=#E3A36F"
